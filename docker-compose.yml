services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: notification
      POSTGRES_DB: notification
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notification"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://notification:notification@postgres:5432/notification?sslmode=disable
      HTTP_ADDR: ":8080"
      WORKER_COUNT: "5"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
