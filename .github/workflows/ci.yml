name: CI/CD Pipeline

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Download Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  build-and-push:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Image Name References
        id: prep
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "notif_image=ghcr.io/${OWNER_LOWER}/notificationservice" >> $GITHUB_OUTPUT
          echo "sched_image=ghcr.io/${OWNER_LOWER}/taskscheduler" >> $GITHUB_OUTPUT

      - name: Build and Push Notification Service Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.notification
          push: true
          tags: |
            ${{ steps.prep.outputs.notif_image }}:latest
            ${{ steps.prep.outputs.notif_image }}:${{ github.sha }}

      - name: Build and Push Task Scheduler Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.scheduler
          push: true
          tags: |
            ${{ steps.prep.outputs.sched_image }}:latest
            ${{ steps.prep.outputs.sched_image }}:${{ github.sha }}
